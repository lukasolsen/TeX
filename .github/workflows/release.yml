name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "Windows"
            platform: "windows-2022"
            args: ""
          - name: "macOS Apple Silicon"
            platform: "macos-14"
            args: "--target aarch64-apple-darwin"
          - name: "macOS Intel"
            platform: "macos-14"
            args: "--target x86_64-apple-darwin"
          - name: "Linux"
            platform: "ubuntu-22.04"
            args: ""
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@39b0b3842c7e8bbf6904c0bfc3d9006fdd4dc4e0 # 1.88.0
        with:
          targets: ${{ startsWith(matrix.platform, 'macos-') && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.9

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            librsvg2-dev \
            patchelf \
            wget

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build and publish
        id: tauri
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: v__VERSION__
          releaseBody: See the assets to download this version.
          releaseDraft: true
          prerelease: false
          generateReleaseNotes: true
          retryAttempts: 2
          args: ${{ matrix.args }}
          assetNamePattern: "[name]-[version]-[platform]-[arch][ext]"
          includeUpdaterJson: false

      - name: Release summary
        if: steps.tauri.outputs.releaseHtmlUrl != ''
        run: |
          {
            echo "## Tauri Release"
            echo ""
            echo "- Platform: \`${{ matrix.name }}\`"
            echo "- Version: \`${{ steps.tauri.outputs.appVersion }}\`"
            echo "- Release: ${{ steps.tauri.outputs.releaseHtmlUrl }}"
            echo "- Artifacts: \`${{ steps.tauri.outputs.artifactPaths }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
